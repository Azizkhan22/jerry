<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jerry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14181F;
    --surface: #1C222C;
    --surface-2: #242B38;
    --user-bubble: #2E3A4F;
    --accent: #D9A05B;
    --accent-ink: #1A1206;
    --text: #E7E9EE;
    --text-muted: #8B95A7;
    --border: #2A3140;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    overflow: hidden;
  }

  /* ---------- layout ---------- */
  .layout { display: flex; height: 100vh; width: 100%; }

  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 14px;
    gap: 4px;
  }
  .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
  .chat-list::-webkit-scrollbar { width: 6px; }
  .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    height: 100vh;
  }

  .chat-wrapper {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  .sidebar-overlay { display: none; }
  .hamburger-btn { display: none; }

  @media (max-width: 760px) {
    .hamburger-btn { display: flex; }
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 80%;
      max-width: 300px;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      z-index: 50;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.visible {
      display: block;
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 40;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .sidebar { transition: none; }
  }

  /* ---------- sidebar contents ---------- */
  .new-chat-btn-full {
    display: flex; align-items: center; gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    margin-bottom: 10px;
    flex-shrink: 0;
    transition: border-color 0.15s;
  }
  .new-chat-btn-full:hover { border-color: var(--accent); }
  .new-chat-btn-full:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .new-chat-btn-full svg { width: 15px; height: 15px; flex-shrink: 0; }

  .chat-item {
    display: flex; align-items: center; gap: 6px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
  }
  .chat-item:hover { background: var(--surface-2); color: var(--text); }
  .chat-item.active { background: var(--surface-2); color: var(--text); }
  .chat-item:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .chat-item-title {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .chat-item-input {
    flex: 1; min-width: 0;
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    padding: 2px 4px;
    outline: none;
  }
  .chat-item-actions {
    display: flex; gap: 2px; flex-shrink: 0;
    opacity: 0; transition: opacity 0.15s;
  }
  .chat-item:hover .chat-item-actions,
  .chat-item.active .chat-item-actions { opacity: 1; }
  .chat-item-actions button {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; padding: 4px; border-radius: 4px;
    display: flex; align-items: center;
  }
  .chat-item-actions button:hover { color: var(--text); background: var(--border); }
  .chat-item-actions button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .chat-item-actions svg { width: 13px; height: 13px; }

  /* ---------- header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .brand { display: flex; align-items: center; gap: 10px; flex: 1; }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #9c6f3a);
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    color: var(--accent-ink);
    font-size: 14px;
  }
  .brand-name {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.02em;
  }
  .status {
    display: flex; align-items: center; gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #5fb87a; }

  /* ---------- messages ---------- */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    max-width: 82%;
    padding: 11px 15px;
    border-radius: var(--radius);
    line-height: 1.5;
    font-size: 14.5px;
    white-space: pre-wrap;
    word-wrap: break-word;
    animation: rise 0.2s ease-out;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.assistant { align-self: flex-start; background: var(--surface-2); border-bottom-left-radius: 4px; }
  .msg.user { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; }

  .typing {
    align-self: flex-start;
    display: flex; gap: 4px;
    padding: 13px 15px;
    background: var(--surface-2);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 1; } }

  .empty-state {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    color: var(--text-muted);
    gap: 8px;
    padding: 40px;
  }
  .empty-state .brand-mark { width: 44px; height: 44px; font-size: 20px; border-radius: 12px; }
  .empty-state h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; font-weight: 500; color: var(--text);
    margin: 6px 0 0;
  }
  .empty-state p { font-size: 13px; margin: 0; max-width: 320px; }

  /* ---------- composer ---------- */
  .composer {
    border-top: 1px solid var(--border);
    padding: 12px 20px 18px;
    flex-shrink: 0;
  }
  .attachment-chip {
    display: none;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(217, 160, 91, 0.1);
    border: 1px solid rgba(217, 160, 91, 0.25);
    border-radius: 999px;
    padding: 6px 12px;
    margin-bottom: 10px;
    width: fit-content;
  }
  .attachment-chip.visible { display: flex; }
  .attachment-chip button {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 14px; line-height: 1; padding: 0;
  }
  .attachment-chip button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 6px 6px 6px 16px;
  }
  textarea#input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    resize: none;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14.5px;
    line-height: 1.5;
    max-height: 140px;
    padding: 9px 0;
  }
  textarea#input::placeholder { color: var(--text-muted); }

  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--surface-2);
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { color: var(--text); background: #2c3444; }
  .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .icon-btn svg { width: 18px; height: 18px; }

  #sendBtn { background: var(--accent); color: var(--accent-ink); }
  #sendBtn:hover { background: #e3ad6a; color: var(--accent-ink); }

  #micBtn.recording { background: var(--accent); color: var(--accent-ink); }

  /* Signature element: live waveform shown on the mic button while recording */
  .waveform { display: flex; align-items: center; gap: 2px; height: 16px; }
  .waveform span {
    width: 3px; border-radius: 2px; background: var(--accent-ink);
    animation: wave 0.9s infinite ease-in-out;
  }
  .waveform span:nth-child(1) { height: 6px;  animation-delay: -0.8s; }
  .waveform span:nth-child(2) { height: 12px; animation-delay: -0.6s; }
  .waveform span:nth-child(3) { height: 16px; animation-delay: -0.4s; }
  .waveform span:nth-child(4) { height: 10px; animation-delay: -0.2s; }
  .waveform span:nth-child(5) { height: 14px; animation-delay: 0s; }
  @keyframes wave { 0%, 100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }

  @media (prefers-reduced-motion: reduce) {
    .msg { animation: none; }
    .typing span { animation: none; opacity: 0.6; }
    .waveform span { animation: none; transform: scaleY(0.8); }
  }
</style>
</head>
<body>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <button class="new-chat-btn-full" id="newChatBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New chat
      </button>
      <div class="chat-list" id="chatList"></div>
    </aside>

    <div class="main">
      <header>
        <button class="icon-btn hamburger-btn" id="hamburgerBtn" aria-label="Open chat list" title="Chats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="brand">
          <div class="brand-mark">J</div>
          <div class="brand-name">Jerry</div>
        </div>
        <div class="status"><span class="status-dot"></span><span>Local</span></div>
      </header>

      <div class="chat-wrapper">
        <div id="chat"></div>

        <div class="composer">
          <div class="attachment-chip" id="attachmentChip">
            <span id="attachmentName"></span>
            <button id="attachmentRemove" aria-label="Remove attachment">&times;</button>
          </div>
          <div class="input-row">
            <textarea id="input" placeholder="Message Jerry..." rows="1"></textarea>
            <input type="file" id="fileInput" hidden>
            <button class="icon-btn" id="attachBtn" aria-label="Attach file" title="Attach file">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="icon-btn" id="micBtn" aria-label="Record voice message" title="Record voice message">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <button class="icon-btn" id="sendBtn" aria-label="Send message" title="Send">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <audio id="ttsPlayer" hidden></audio>

<script>
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebarOverlay');
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const newChatBtn = document.getElementById('newChatBtn');
  const chatListEl = document.getElementById('chatList');

  const chatEl = document.getElementById('chat');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const micBtn = document.getElementById('micBtn');
  const attachBtn = document.getElementById('attachBtn');
  const fileInput = document.getElementById('fileInput');
  const attachmentChip = document.getElementById('attachmentChip');
  const attachmentName = document.getElementById('attachmentName');
  const attachmentRemove = document.getElementById('attachmentRemove');
  const ttsPlayer = document.getElementById('ttsPlayer');

  const MIC_ICON = micBtn.innerHTML;
  const WAVEFORM = '<div class="waveform"><span></span><span></span><span></span><span></span><span></span></div>';
  const PENCIL_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  const TRASH_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';

  let chats = [];
  let activeChatId = null;

  // ---------- helpers: chat panel ----------

  function clearEmptyState() {
    const el = chatEl.querySelector('.empty-state');
    if (el) chatEl.innerHTML = '';
  }

  function showEmptyState() {
    chatEl.innerHTML =
      '<div class="empty-state">' +
        '<div class="brand-mark">J</div>' +
        '<h2>Hey, I&rsquo;m Jerry</h2>' +
        '<p>Ask about your inbox, calendar, or tasks, or just say what&rsquo;s on your mind. Tap the mic to talk instead of typing.</p>' +
      '</div>';
  }

  function addBubble(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  }
  inputEl.addEventListener('input', autoResize);

  // ---------- sidebar (mobile drawer) ----------

  function openSidebar() {
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('visible');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('visible');
  }
  hamburgerBtn.addEventListener('click', openSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);

  // ---------- chat list ----------

  async function refreshChatList() {
    try {
      const res = await fetch('/api/chats');
      const data = await res.json();
      chats = data.chats;
      renderChatList();
    } catch (e) {}
  }

  function renderChatList() {
    chatListEl.innerHTML = '';
    chats.forEach(function (c) {
      const item = document.createElement('div');
      item.className = 'chat-item' + (c.id === activeChatId ? ' active' : '');
      item.dataset.id = c.id;
      item.tabIndex = 0;
      item.setAttribute('role', 'button');

      const title = document.createElement('span');
      title.className = 'chat-item-title';
      title.textContent = c.title;
      item.appendChild(title);

      const actions = document.createElement('div');
      actions.className = 'chat-item-actions';
      actions.innerHTML =
        '<button class="rename-btn" aria-label="Rename chat" title="Rename">' + PENCIL_ICON + '</button>' +
        '<button class="delete-btn" aria-label="Delete chat" title="Delete">' + TRASH_ICON + '</button>';
      item.appendChild(actions);

      item.addEventListener('click', function (e) {
        if (e.target.closest('.chat-item-actions')) return;
        switchChat(c.id);
      });
      item.addEventListener('keydown', function (e) {
        if ((e.key === 'Enter' || e.key === ' ') && !e.target.closest('.chat-item-actions')) {
          e.preventDefault();
          switchChat(c.id);
        }
      });

      actions.querySelector('.rename-btn').addEventListener('click', function (e) {
        e.stopPropagation();
        startRename(item, c);
      });
      actions.querySelector('.delete-btn').addEventListener('click', function (e) {
        e.stopPropagation();
        deleteChat(c.id);
      });

      chatListEl.appendChild(item);
    });
  }

  function startRename(item, chatMeta) {
    const titleEl = item.querySelector('.chat-item-title');
    const input = document.createElement('input');
    input.className = 'chat-item-input';
    input.value = chatMeta.title;
    titleEl.replaceWith(input);
    input.focus();
    input.select();

    let committed = false;
    async function commit() {
      if (committed) return;
      committed = true;
      const newTitle = input.value.trim() || chatMeta.title;
      chatMeta.title = newTitle;
      try {
        await fetch('/api/chats/' + chatMeta.id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: newTitle })
        });
      } catch (e) {}
      renderChatList();
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = chatMeta.title; input.blur(); }
    });
  }

  async function deleteChat(chatId) {
    if (!confirm('Delete this chat? This cannot be undone.')) return;

    try {
      await fetch('/api/chats/' + chatId, { method: 'DELETE' });
    } catch (e) {
      addBubble('assistant', "Sorry, I couldn't delete that chat. Is the server still running?");
      return;
    }

    chats = chats.filter(function (c) { return c.id !== chatId; });

    if (chats.length === 0) {
      const res = await fetch('/api/chats', { method: 'POST' });
      chats = [await res.json()];
    }

    if (chatId === activeChatId) {
      await switchChat(chats[0].id);
    } else {
      renderChatList();
    }
  }

  async function switchChat(chatId) {
    activeChatId = chatId;
    localStorage.setItem('jerry_active_chat', chatId);
    renderChatList();
    closeSidebar();

    chatEl.innerHTML = '';
    attachmentChip.classList.remove('visible');

    try {
      const res = await fetch('/api/history?chat_id=' + encodeURIComponent(chatId));
      const data = await res.json();
      if (!data.messages || data.messages.length === 0) {
        showEmptyState();
      } else {
        data.messages.forEach(function (m) { addBubble(m.role, m.content); });
      }
    } catch (e) {
      showEmptyState();
    }
  }

  newChatBtn.addEventListener('click', async function () {
    try {
      const res = await fetch('/api/chats', { method: 'POST' });
      const created = await res.json();
      chats.unshift(created);
      await switchChat(created.id);
    } catch (e) {
      addBubble('assistant', "Sorry, I couldn't start a new chat. Is the server still running?");
    }
  });

  async function loadChats() {
    try {
      const res = await fetch('/api/chats');
      const data = await res.json();
      chats = data.chats;
    } catch (e) {
      chats = [];
    }

    if (chats.length === 0) {
      try {
        const res = await fetch('/api/chats', { method: 'POST' });
        chats = [await res.json()];
      } catch (e) {
        addBubble('assistant', "Sorry, I couldn't reach the server. Is it still running?");
        return;
      }
    }

    const stored = localStorage.getItem('jerry_active_chat');
    const exists = chats.find(function (c) { return c.id === stored; });
    await switchChat(exists ? stored : chats[0].id);
  }

  // ---------- sending messages ----------

  async function sendText() {
    const text = inputEl.value.trim();
    if (!text) return;

    clearEmptyState();
    addBubble('user', text);
    inputEl.value = '';
    autoResize();
    attachmentChip.classList.remove('visible');

    showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: activeChatId, message: text })
      });
      const data = await res.json();
      hideTyping();
      addBubble('assistant', data.reply);
      await refreshChatList();
    } catch (e) {
      hideTyping();
      addBubble('assistant', "Sorry, I couldn't reach the server. Is it still running?");
    }
  }

  sendBtn.addEventListener('click', sendText);
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendText();
    }
  });

  // ---------- file attachment ----------

  attachBtn.addEventListener('click', function () { fileInput.click(); });

  fileInput.addEventListener('change', async function () {
    const file = fileInput.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append('chat_id', activeChatId);
    formData.append('file', file);
    try {
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      const data = await res.json();
      attachmentName.textContent = '\uD83D\uDCCE ' + data.filename;
      attachmentChip.classList.add('visible');
    } catch (e) {
      addBubble('assistant', "Sorry, that file couldn't be uploaded.");
    }
    fileInput.value = '';
  });

  attachmentRemove.addEventListener('click', async function () {
    attachmentChip.classList.remove('visible');
    try {
      await fetch('/api/clear-attachment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: activeChatId })
      });
    } catch (e) {}
  });

  // ---------- voice recording ----------

  let mediaRecorder = null;
  let audioChunks = [];
  let recording = false;

  micBtn.addEventListener('click', async function () {
    if (!recording) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const candidates = ['audio/webm;codecs=opus', 'audio/ogg;codecs=opus', 'audio/webm', 'audio/mp4'];
        const mimeType = candidates.find(function (t) { return MediaRecorder.isTypeSupported(t); }) || '';
        mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType: mimeType }) : new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = function (e) {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = function () {
          stream.getTracks().forEach(function (t) { t.stop(); });
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
          sendVoice(blob);
        };

        mediaRecorder.start();
        recording = true;
        micBtn.classList.add('recording');
        micBtn.innerHTML = WAVEFORM;
      } catch (err) {
        addBubble('assistant', 'Microphone access was denied or is unavailable in this browser.');
      }
    } else {
      mediaRecorder.stop();
      recording = false;
      micBtn.classList.remove('recording');
      micBtn.innerHTML = MIC_ICON;
    }
  });

  async function sendVoice(blob) {
    clearEmptyState();
    showTyping();

    let ext = 'webm';
    if (blob.type.indexOf('ogg') !== -1) ext = 'ogg';
    else if (blob.type.indexOf('mp4') !== -1) ext = 'mp4';

    const formData = new FormData();
    formData.append('chat_id', activeChatId);
    formData.append('audio', blob, 'recording.' + ext);

    try {
      const res = await fetch('/api/voice', { method: 'POST', body: formData });
      const data = await res.json();
      hideTyping();
      addBubble('user', data.transcript);
      addBubble('assistant', data.reply);
      ttsPlayer.src = data.audio_url;
      ttsPlayer.play().catch(function () {});
      await refreshChatList();
    } catch (e) {
      hideTyping();
      addBubble('assistant', "Sorry, something went wrong processing that voice message.");
    }
  }

  loadChats();
</script>
</body>
</html>
